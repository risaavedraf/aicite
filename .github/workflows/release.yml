name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: cite-linux-amd64
            binary_path: target/release/cite
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: cite-windows-amd64.exe
            binary_path: target/release/cite.exe
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: cite-macos-arm64
            binary_path: target/release/cite
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Rename binary
        shell: bash
        run: cp "${{ matrix.binary_path }}" "${{ matrix.artifact_name }}"

      - name: Smoke test
        shell: bash
        run: ./"${{ matrix.artifact_name }}" health --json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            cite-linux-amd64
            cite-windows-amd64.exe
            cite-macos-arm64
